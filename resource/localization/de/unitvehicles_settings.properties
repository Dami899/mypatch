uv.pursuit=Verfolungs-Einstellungen

uv.pursuit.heatlevels=Heat-Stufen
uv.pursuit.heatlevels.enable=Aktiviert Heat-Stufen
uv.pursuit.heatlevels.enable.desc=Aktiviert Heat-Stufen. Wenn das Kopfgeld bestimmt Grenzwerte erreicht, erhöht sich die Heat-Stufe und damit die Anzahl von Einsatzwagen, ihre Aggresivität und Vielfalt.
uv.pursuit.heatlevels.aiunits=Spawn von KI-Einheiten
uv.pursuit.heatlevels.aiunits.desc=Haupt-KI-Einheiten (Streife, Unterstützung, etc.) werden in der Nähe von Verfolgungsjagden spawnen.\n\nRhino- und Helikopter-Einheiten können mittels dem Einheiten-Manager-Tool aktiviert werden.

uv.pursuit.randomplayerunits=Zufällige Spieler-Einheiten
uv.pursuit.randomplayerunits.desc=Wenn aktiviert, werden von Spielern kontrollierte Einheiten zufällig aus den zur Verfügung stehenden ausgewählt.
uv.pursuit.autohealth=Unbegrenzte Haltbarkeit
uv.pursuit.autohealth.desc=Wagen Verdächtiger erhalten unlimiterte Gesundheit und deine Gesamt-Gesundheit als Verdächtiger wird entsprechend dem Gewicht deines Wagens gesetzt.\n\nAktiveren, wenn du nicht ständigen Totalschaden erleiden willst oder dir härtere Verdächtige wünschst.
uv.pursuit.wheelsdetaching=Rad-Verlust
uv.pursuit.wheelsdetaching.desc=Wenn aktiviert, lösen sich Räder von zerstörten Fahrzeugen.
uv.pursuit.spottedfreezecam=[Nur Solo] Gesichtet-Freeze-Cam
uv.pursuit.spottedfreezecam.desc=Verlangsamt das Spiel und richtet die Kamera auf den nächsten Einsatzwagen, wenn eine Verfolgung beginnt.
# uv.pursuit.canexitvehicle=Allow Vehicle Exit
# uv.pursuit.canexitvehicle.desc=If enabled, users can exit their vehicles in the middle of races and pursuits.
uv.pursuit.repaircooldown=Reparatur-Abklingzeit
uv.pursuit.repaircooldown.desc=Die Dauer bevor Reparatur-Werkstätte wieder benutzt werden können.\n\nAuf 0 setzen, um sie auf einmalige Benutzung zu limitieren.
uv.pursuit.repairrange=Reparatur-Reichweite
uv.pursuit.repairrange.desc=Distanz in Hammer Units, in der eine Werkstatt deinen Wagen reparieren kann.
uv.pursuit.noevade=Kein Entkommen
uv.pursuit.noevade.desc=Wenn aktiviert, kannst du niemals in den Flucht-Status wechseln.\n\nViel Glück!
uv.pursuit.bustedtime=Zeit bis zur Verhaftung
uv.pursuit.bustedtime.desc=Zeit in Sekunden, die es als Verdächtiger braucht, um verhaftet zu werden.\n\nZum Deaktivieren auf 0 setzen.
uv.pursuit.respawntime=Respawn-Abklingzeit (Einheit)
uv.pursuit.respawntime.desc=Zeit in Sekunden, bevor ein Spieler in einem Einsatzwagen respawnen können.\n\nZum Deaktivieren auf 0 setzen.
uv.pursuit.spikeduration=Zeit zum Wiederaufpumpen der Reifen
uv.pursuit.spikeduration.desc=Die Zeit, in Sekunden, bevor Reifen wieder aufgepumpt werden, nachdem sie von Nagelbändern getroffen wurden.\n\nAuf 0 setzen, um das Wiederaufpumpen von Reifen zu deaktivieren.

uv.pursuit.roadblocks=Straßensperren-Einstellungen
uv.pursuit.roadblocks.maxnr=Max. Anzahl Straßensperren 
uv.pursuit.roadblocks.maxnr.desc=Wie viele Straßensperren gleichzeitig geladen sein können.\n\Auf 0 setzen, um das Spawnen von Straßensperren zu deaktivieren.

uv.pursuit.roadblocks.alwaysjoinpursuit="Nach Durchfahren sich der Verfolgung anschließen"-Override
uv.pursuit.roadblocks.alwaysjoinpursuit.desc=Bestimmt, ob sich Einheiten, die Teil einer Straßensperre sind, sich immer einer Verfolung anschließen sollen, wenn ein Verdächtiger die Sperre durchfährt, sich nie anschließen, oder jede Straßensperre selbst entscheidet.

uv.pursuit.roadblocks.alwaysjoinpursuit.off=Deaktiviert
uv.pursuit.roadblocks.alwaysjoinpursuit.always=Immer
uv.pursuit.roadblocks.alwaysjoinpursuit.never=Nie

#---------- New Settings Menu, Pursuit Tech
uv.ptech=Verfolgungs-Tech
uv.ptech.racer=Rennfahrer-Verfolgungs-Tech
uv.ptech.racer.desc=Aktiveren, damit Rennfahrer mit Verfolgungs-Tech spawnen.
uv.ptech.friendlyfire=Friendly Fire
uv.ptech.friendlyfire.desc=Aktiveren, wenn Rennfahrer sich gegenseitig mit Verfolgungs-Tech treffen können sollen.
uv.ptech.roadblockfriendlyfire=Straßensperren-Friendly-Fire
uv.ptech.roadblockfriendlyfire.desc=Aktivieren, falls Einheiten ebenfalls von Nagelstreifen betroffen sein sollen, die zusammen mit Straßensperren spawnen.

#---------- New Settings Menu, Pursuit Breakers
uv.pb=Verfolgungsbrecher
uv.pb.maxnr=Max. Anzahl
uv.pb.maxnr.desc=Wie viele Verfolgungsbrecher gleichzeitig geladen sein können.\n\Auf 0 setzen, um das Spawnen von Verfolgungsbrecher zu deaktivieren.

uv.pb.cooldown=Spawn-Cooldown
uv.pb.cooldown.desc=Wie lange es dauert (in Sekunden), bevor ein Verfolungsbrecher despawnt und ein neuer an seiner Stelle spawnt.

#---------- New Settings Menu, AI
uv.ai.title=KI-Einstellungen

uv.ailogic=KI-Logik
uv.ailogic.optimizerespawn=Optimiere Respawn
uv.ailogic.optimizerespawn.desc=Units will teleport ahead of suspects instead of respawning.\n\nImproves performance.\n\nNote: Incompatible with Simfphys.
uv.ailogic.relentless=Rücksichtslos
uv.ailogic.relentless.desc=KI-Einheiten werden sich aggressiver verhalten, wie die Cops in NFS Rivals.\n\nDer Zweck heiligt die Mittel, selbst wenn sie ihre eigene Sicherheit vernachlässigen müssen.\n\nAußerdem werden sie wissen, wo du dich versteckst, selbst im Cooldown.
uv.ailogic.wrecking=Totalschaden aktivieren
uv.ailogic.wrecking.desc=Polizeiwagen und Verkehrsteilnehmer können Totalschaden erleiden.
uv.ailogic.detectionrange=Erkennungs-Radius
uv.ailogic.detectionrange.desc=Minimaler Spawn-Radius für Wagen (in Hammer Units), wenn Einheiten manuell gespawnt werden.\n\nVerwende höhere Werte, wenn du Probleme beim Spawnen von Einheiten hast.

uv.ailogic.headlights=Scheinwerfer aktivieren
uv.ailogic.headlights.desc=KI-Wagen werden ihre Frontscheinwerfer benutzen.\n\nHelikopter-Einheiten leuchten außerdem mit ihren Suchscheinwerfern.\n\nBeeinträchtigt die Performance.
uv.ailogic.headlights.off=Immer aus
uv.ailogic.headlights.auto=Automatisch
uv.ailogic.headlights.always=Immer an

uv.ailogic.usenitrousracer=Nitro für KI-Rennfahrer
uv.ailogic.usenitrousracer.desc=Erlaubt KI-Rennfahrern den Einsatz von Nitro.\n\nAchtung: Nur verfügbar für Glide-Fahrzeuge.
uv.ailogic.usenitrousunit=Nitro für KI-Einheiten
uv.ailogic.usenitrousunit.desc=Erlaubt KI-Einheiten den Einsatz von Nitro.\n\nAchtung: Nur verfügbar für Glide-Fahrzeuge.

uv.ailogic.autohealthracer=Unbegrenzte Haltbarkeit für KI-Fahrern
uv.ailogic.autohealthracer.desc=Gibt KI-Fahrern unbegrenzte Fahrzeug-Haltbarkeit.

uv.ailogic.customizeracer=Fahrzeuge der KI-Fahrer anpassen
uv.ailogic.customizeracer.desc=KI-Fahrer bestimmen zufällig Farbe, Skin und Bodygroup, wenn sie Spawnen.\n\nHinweis: Gilt nicht für Glide-Fahrzeuge mit dem Bodygroup-basierten Schadens-Script.

uv.ailogic.tractioncontrol=Haftungskontrolle
uv.ailogic.tractioncontrol.desc=KI-Fahrer und -Einheiten werden vom Gas gehen, wenn sie die Haftung verlieren.\n\nHinweis: Gilt nur für Glide- und Simfphys-Fahrzeuge.

uv.ainav=KI-Navigation ———
uv.ainav.pathfind=Wegfindung
uv.ainav.pathfind.desc=Die KI wird den A*-Algorithmus mittels Navmesh / Decent-Vehicle-Wegpunkte zur Wegfindung verwenden.\n\nBeeinträchtigt die Performance.
uv.ainav.dvpriority=DV-Wegpunkt-Priorität
uv.ainav.dvpriority.desc=KI wird bei der Wegfindung versuchen Decent-Vehicle-Wegpunkte dem Navmesh vorzuziehen, wenn vorhanden.
# uv.ainav.dvdistancebased=DV Waypoint Distance-Based
# uv.ainav.dvdistancebased.desc=AI will use a distance-based approach to navigate on Decent Vehicle Waypoints.\n\nDisabled = Direct engaging when suspect is in view.\n\nEnabled = Navigate via waypoints if too far from suspect.

uv.chatter=Funk-Gequatsche
uv.chatter.enable=Funk-Gequatsche aktivieren
uv.chatter.enable.desc=Aktiviert Sprachkommunikation zwischen KI-Einheiten und der Zentrale.
uv.chatter.text=Funk-Gequatsche als Text
uv.chatter.text.desc=Das Gequatsche des Funkgeräts wird in der Chatbox ausgegeben, statt über Ton.

uv.response=Rufbereitschaft
uv.response.enable=Rufbereitschaft aktivieren
uv.response.enable.desc=KI-Einheiten werden spawnen und auf der Map verteilten Rufen nachgehen.
uv.response.speedlimit=Tempolimit (mph)
uv.response.speedlimit.desc=Untätige KI-Einheiten werden dieses vordefinierte Tempolimit durchsetzen.\n\nKI-Einheiten auf Streife werden das Tempolmit durchsetzen, das in den DV-Wegpunkten definiert ist.\n\nZum Deaktivieren auf 0 setzen.
