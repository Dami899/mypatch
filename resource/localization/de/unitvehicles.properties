uv.ptech.force.desc=Wie viel Kraft beim Treffen eines Ziels angewandtt wird.

uv.ptech.lockontime=Lock-On-Zeit
uv.ptech.lockontime.desc=Wie lange diese Verfolgungs-Tech braucht, um sein Ziel anzuvisieren.

uv.ptech.disableduration=Deaktivierungs-Dauer
uv.ptech.disableduration.desc=Wie lange ein Wagen deaktiviert bleibt, wenn es von dieser Verfolgungs-Tech getroffen wurde.

