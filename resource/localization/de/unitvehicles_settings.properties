uv.airacer.spawnai.desc=Spawnt einen zufälligen KI-Fahrer.

uv.airacer.spawnai.val=Spawnt %s KI-Fahrer
uv.airacer.spawnai.val.desc=Spawnt diese Anzahl KI.\n\nAnpassen mit [glyph:MWHEELUP][glyph:MWHEELDOWN].\n\nWarnung: Eine große Menge KI zu spawnen kann zum Einfrieren des Spiels führen.

uv.airacer.clear=Aktive KI-Fahrer löschen
uv.airacer.clear.desc=Entfernt alle aktuellen KI-Fahrer.

uv.airacer.override=Fahrzeug-Override
uv.airacer.override.desc=KI-Fahrer werden bei ihrer Fahrzeugwahl Fahrzeuge aus der Liste unten Fahrzeugen aus der Datenbank vorziehen.

uv.airacer.overridelist=Zugewiesenes Fahrzeug: %s
uv.airacer.overridelist.desc=Ein Fahrzeug mit Rechtsklick der Liste hinzufügen.\n\nMit wiederholtem Rechtsklick wieder von der Liste entfernen.
uv.airacer.overridelist.hover=Ein Fahrzeug mit Rechtsklick der Liste hinzufügen.\n\nMit wiederholtem Rechtsklick wieder von der Liste entfernen.

