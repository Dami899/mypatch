uv.addons.builtin.desc=Addons, die in den Einsatzwagen enthalten sind.
uv.addons.vcmod.els=VCMod-ELS-Priorität
uv.addons.vcmod.els.desc=Einheiten, die Basis-HL2-Fahrzeuge benutzen, werden mittels Photon versuchen ELS von VCMod zu verwenden, falls beide installiert sind.

