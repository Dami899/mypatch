#---------- New Settings Menu, Heat Level Manager
uv.hm=Heat-Stufen-Manager
uv.hm.open=Heat-Stufen-Manager öffnen
uv.hm.open.desc=Öffnet den Heat-Stufen-Manager, wo du alle Einstellungen vornehmen kannst, die Heat-Stufen, Verfolgungs-Einheiten, Kopfgeld und vieles mehr betreffen.

uv.hm.presets=Presets
uv.hm.presets.warning=WARNUNG
uv.hm.presets.confirm=Dies wird all deine Einstellungen überschreiben.\nKann nicht rückgängig gemacht werden.\nSicher, dass du Preset "%s" laden willst?

uv.hm.presets.presetname=Preset-Name - [+attack2] auf einem Preset drücken, um es hier einzufügen
uv.hm.presets.presetname.require=Ein Preset-Name ist erforderlich!

uv.hm.presets.save=Preset speichern
uv.hm.presets.save.desc=Speichert ein Preset mit dem gewünschten Namen und den aktuell vorgenommenen Einstellungen.

uv.hm.presets.delete=Preset löschen
uv.hm.presets.delete.desc=Löscht das Preset, das zuletzt mit [+attack2] ausgewählt wurde.

uv.hm.presets.export=Geladene Einstellungen für Workshop-Addon exportieren
uv.hm.presets.export.desc=Exportiertdie Einstellungen in eine Workshop-kompatible Datei.\n\nÜberprüfe den Chat, für den exakten Dateipfad.

uv.hm.lvl=Heat-Stufe %s

uv.hm.timedhl=Zeitabhängige Heat-Stufen
uv.hm.timedhl.desc=Wenn aktiviert, nimmt die Heat-Stufe im Laufe der Zeit zu, statt von der Kopfgeldhöhe abzuhängen.

uv.hm.minhl=Minimale Heat-Stufe
uv.hm.minhl.desc=Legt die minimale Heat-Stufe fest, die du während einer Verfolgung erreichen kannst. Höhere Stufen bieten aggressivere Einheiten.

uv.hm.maxhl=Maximale Heat-Stufe
uv.hm.maxhl.desc=Legt die maximale Heat-Stufe fest, die du während einer Verfolgung erreichen kannst. Niedrigere Stufen bieten weniger aggressive Einheiten.

uv.hm.enablept=Einheiten können mit Verfolgungs-Tech spawnen
uv.hm.enablept.desc=Erlaubt es Einheiten mit Verfolungs-Tech zu spawnen.\n\nStreife- und Unterstützung-Einheiten werden nie mit Verfolgungs-Tech spawnen, egal ob diese Option aktiviert ist oder nicht.

uv.hm.pt.spawnwith=Verfolgungs-Tech erlauben
uv.hm.pt.spawnwith.desc=Aktieveren, wenn KI- und Spieler-gesteuerte Einheiten mit dieser Verfolgungs-Tech spawnen und sie einsetzten können sollen.
uv.hm.pt.spawnwith.desc.air=Aktivieren, wenn Luft-Einheiten diese Verfolungs-Tech einsetzen können sollen.

uv.hm.commander=Einsatzleiter-Einstellungen
uv.hm.commander.solo=Ein Einsatzleiter
uv.hm.commander.solo.desc=Wenn aktiviert, wird nur eine einzige Einsatzleiter-Einheit zur Verfolgung entsandt.\n\nWenn die Einsatzleiter-Einheit aktiv ist, gibt es unbegrenzte Verstärkung-Einheiten.

uv.hm.commander.health=Einsatzleiter-Health
uv.hm.commander.health.desc=Wie viel Health die Einsatzleiter-Einheit hat.\n\nErhöhen, wenn es dir zu einfach ist!

uv.hm.commander.evade=Mit aktivem Einsatzleiter entkommen
uv.hm.commander.evade.desc=Wenn aktiviert, können Rennfahrer einer Verfolung entkommen, selbst wenn ein Einsatzleiter aktiv ist.

uv.hm.commander.norepair=Reparatur-Werkstatt beschränken
uv.hm.commander.norepair.desc=Wenn aktiviert, kann die Einsatzleiter-Einheit nicht die Werkstatt zur Reparatur seines Fahrzeugs verwenden.\n\nBeachte, dass er sie immer noch zum Auffüllen seiner Verfolgungs-Tech verwenden kann.

uv.hm.air=Lufteinheit-Einstellungen
uv.hm.air.model=Einheits-Modell
uv.hm.air.model.desc=Welches Modell die Helikopter-Einheit benutzen soll.

uv.hm.air.canbust=Kann Rennfahrer verhaften
uv.hm.air.canbust.desc=Wenn aktiviert, kann die Helikopter-Einheit Rennfahrer verhaften, indem sie nah an sie ranfliegen.

uv.hm.air.pt.exp=Explosive Fässer erlauben
uv.hm.air.pt.spikes=Nagelbänder erlauben
uv.hm.air.pt.desc=Wenn aktiviert, kann die Helikopter-Einheit Verfolgungs-Tech einsetzen.\n\nHat keinen Effekt, falls "Verfolgungs-Tech erlauben" deaktiviert ist.

uv.hm.disablebounty=Kopfgeld für das Ausschalten von Einheiten
uv.hm.disablebounty.desc=Wie viel Kopfgeld du erhältst, wenn du eine Einheit von diesem Typ ausschaltest.

uv.hm.vp=Stimm-Profile
uv.hm.vp.desc=Wähle welches Stimm-Profil-Set von dieser KI-Einheit benutzt wird.
uv.hm.vp.dispatch.desc=Wähle welches Stimm-Profil-Set von der Zentrale benutzt wird.
uv.hm.vp.misc.desc=Wähle welches Stimm-Profil-Set für verschiedene Sounds benutzt wird.

uv.hm.heat=Heat-Stufen-Einstellungen

uv.hm.heat.bounty.10s=Kopfgeld alle 10s
uv.hm.heat.bounty.10s.desc=Wie viel Kopfgeld du alle 10 Sekunden dazuverdienst.

uv.hm.heat.heatlvl.time=Heat-Dauer
uv.hm.heat.heatlvl.time.desc=Wie lange es dauert, bis sich deine Heat-Stufe erhöht.\n\nHat keinen Effekt, wenn "Zeitabhängige Heat-Stufen" deaktiviert ist.#Does nothing if "Timed Heat Levels" is disabled.

uv.hm.heat.minbounty=Minimum Kopfgeld
uv.hm.heat.minbounty.desc=Wie hoch muss das Kopfgeld sein, um diese Heat-Stufe zu erreichen?\n\nDarf sich nicht mit Werten anderer Heat-Stufen überschneiden!\n\nHat keinen Effekt, wenn "Zeitabhängige Heat-Stufen" aktiviert ist.

uv.hm.heat.maxunits=Maximum Einheiten
uv.hm.heat.maxunits.desc=Wie viele Einheiten können dich gleichzeitig verfolgen?\n\nHöhere Werte können Performance beeinträchtigen.

uv.hm.heat.avaunits=Verfügbare Einheiten
uv.hm.heat.avaunits.desc=Wie viele Einheiten können zur Verfolgung spawnen, bevor sie Verstärkung anfordern müssen?

uv.hm.heat.backuptime=Verstärkungs-Timer
uv.hm.heat.backuptime.desc=Wie lange es dauert, bis Verstärkung eintrifft und sich der Verfolgung anschließt.

uv.hm.heat.bustspeed=Verhaftungs-Geschwindigkeit (MPH)
uv.hm.heat.bustspeed.desc=Wie schnell Fahrer sein sollten, um nicht verhaftet zu werden.

uv.hm.heat.cooldowntime=Cooldown-Timer
uv.hm.heat.cooldowntime.desc=Wie lange du dich im Cooldown befinden musst, um erfolgreich zu entkommen.

uv.hm.heat.roadblocks=Straßensperren aktivieren
uv.hm.heat.roadblocks.desc=Wenn aktiviert, können bei dieser Heat-Stufe Straßensperren spawnen.

uv.hm.heat.helicopter=Helikopter-Einheiten aktivieren
uv.hm.heat.helicopter.desc=Wenn aktiviert, können bei dieser Heat-Stufe Helikopter-Einheiten spawnen.\n\nKeep an eye to the sky, and find overhead cover!

uv.hm.units=Einheiten
uv.hm.units.desc=Wähle, welche Einheiten während einer Verfolung in diesem Slot erscheinen sollen.

uv.hm.units.selected=Ausgewählte Einheiten
uv.hm.units.selected.desc=Die Einheiten, die während einer Verfolgung in diesem Slot erscheinen werden.

uv.hm.units.spawnchance=Spawn-Wahrscheinlichkeit
uv.hm.units.spawnchance.desc=Wahrscheinlichkeit dieser Einheit während dieser Heat-Stufe zu spawnen.

# uv.hm.units.limit=Spawn Limit
# uv.hm.units.limit.desc=How many Units of this type can be part of the chase.\n\nSet to 0 for no limit.\n\nSet to -1 for it to only appear in roadblocks.

uv.hm.units.override=Basis-Fahrzeuge verwenden
uv.hm.units.override.desc=Einheiten werden Fahrzeuge aus der Liste unten Fahrzeugen aus der Datenbank vorziehen.

