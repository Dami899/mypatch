uv.ptech.power=Power
uv.ptech.power.desc=Wie viel Power die Verfolgungs-Tech hat.

uv.ptech.damage=Schaden bei Treffer
uv.ptech.damage.desc=Multipliziert die zugefügte Schadensmenge, bei einem Treffer.\nFür vollen Schaden auf 1 setzen.

uv.ptech.damagecommander=Einsatzleiter-Schaden bei Treffer
uv.ptech.damagecommander.desc=Multipliziert die zugefügte Schadensmenge, wenn ein Einsatzleiter getroffen wird.\nFür vollen Schaden auf 1 setzen.

uv.ptech.cooldown=Abklingzeit
uv.ptech.cooldown.desc=Wie lange es braucht, bis diese Verfolgungs-Tech wieder eingesetzt werden kann.

uv.ptech.maxammo=Anzahl Ladungen
uv.ptech.maxammo.desc=Wie oft diese Verfolgungs-Tech eingesetzt werden kann, bevor sie aufgebraucht ist.\nFür endlosen Vorrat auf 0 setzen.

uv.ptech.maxdistance=Reichweite
uv.ptech.maxdistance.desc=Wie nahe ein Ziel sein kann, um diese Verfolgungs-Tech zu aktivieren.\nGemessen in Hammer-Units.

