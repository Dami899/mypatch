uv.ui.preracepopup.desc=Vor Rennstart, zeige Informationen zum Rennen; Rundenzahl, Checkpoint-Anzahl, Startposition und beste Runde.

uv.ui.subtitles=Bullen-Gequatsche-Untertitel
uv.ui.subtitles.desc=Zeigt Untertitel für Bullen-Gequatsche an.\n\nHinweis: Betrifft nur das Standard-Bullen-Gequatsche.\n\nNur in Englisch verfügbar.

uv.ui.vehnametakedown=Fahrzeugnamen bei Verhaftung verwenden
uv.ui.vehnametakedown.desc=Zeigt bei Verhaftungen die Fahrzeug- statt Einheiten-Namen an.

