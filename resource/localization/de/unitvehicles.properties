uv.ptech.killswitch.desc=Killswitch visiert vorausfahrende Fahrzeuge an, erfasst sie und löst einen gewaltigen elektrostatischen Impuls aus, der ihre elektrischen Systeme vorübergehend lahmlegt.

uv.ptech.killswitch.activated=KILLSWITCH AKTIV
uv.ptech.killswitch.lockingon=KILLSWITCH ERFASST ZIEL
uv.ptech.killswitch.dodged=KILLSWITCH ABGEWEHRT
uv.ptech.killswitch.hit=Du hast %s mit Killswitch getroffen
uv.ptech.killswitch.hit.you=%s hat dich mit Killswitch getroffen

uv.ptech.killswitch.engine.on=MOTOR NEUGESTARTET
uv.ptech.killswitch.getclose=KOMM NAHE, UM KILLSWITCH ZU BENUTZEN
uv.ptech.killswitch.novalid=KEIN GÜLTIGES ZIEL FÜR KILLSWITCH

uv.ptech.spikes.title=——— Nagelband ———
uv.ptech.spikes=Nagelband
uv.ptech.spikes.short=NÄGEL
uv.ptech.spikes.desc=Nagelbänder werden aus dem Heck des Fahrzeugs abgeworfen und entfalten sich schnell, um die Reifen jedes Wagens, der darüber fährt, zu beschädigen. Mehrere Fahrzeuge können getroffen werden, wenn diese nicht ausweichen können.

uv.ptech.spikes.activated=NAGELBAND ABGEWORFEN

uv.ptech.spikes.tiresreinflate=REIFEN WERDEN AUFGEPUMPT

uv.ptech.shockram.title=——— Schockramme ———
uv.ptech.shockram=Schockramme
uv.ptech.shockram.short=SCHRA
uv.ptech.shockram.desc=Die Schockramme erzeugt eine Schalldruckwelle vor dem Fahrzeug, die alle getroffenen Wagen wegstößt und beschädigt.

uv.ptech.shockram.activated=SCHOCKRAMME EINGESETZT
uv.ptech.shockram.hit=Du hast %s mit einer Schockramme getroffen
uv.ptech.shockram.hit.you=%s hat dich mit einer Schockramme getroffen

uv.ptech.gpsdart.title=——— GPS-Dart ———
