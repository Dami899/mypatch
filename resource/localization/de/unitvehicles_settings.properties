uv.ui.unitstype.feet=Fuß
uv.ui.unitstype.yards=Yard

uv.ui.deadzone=X-Achse-Deadzone
uv.ui.deadzone.desc=Bewegt UI-Elemente näher in die Bildschirmmitte.\n\nPraktisch für Ultrawide-Monitore.

uv.ui.scale=X-Achse-Skalierung
uv.ui.scale.desc=Skaliert UI-Elemente hoch oder runter.\n\nPraktisch für Ultrawide-Monitore.

uv.ui.menu=UV-Menü
uv.ui.menu.desc=Verändere wie das UV-Menü aussieht, indem du hier seine Farben und verschiedene Funktionen anpasst.

uv.ui.menu.hidedesc=Beschreibungen zwangsausblenden
uv.ui.menu.hidedesc.desc=Blendet den Beschreibungs-Tabs in allen UV-Menü-Tabs zwangsweise aus, wodurch die Menübreite geschmälert wird.\n\nMenü-Instanz muss neugeladen werden, um Änderung sichtbar zu machen.

