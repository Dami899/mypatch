uv.tip=TIP: %s

# Shared
uv.tip.repairshop=Use the [string:uv.repairshop] to repair your vehicle and replenish your Pursuit Tech. If using <color=255,255,0>Glide // Circular Functions</color>, this will refill your nitrous.

uv.tip.pt.emp1=Use the [string:uv.ptech.emp] to deliver a damaging shock to the vehicle in front.
uv.tip.pt.emp2=Dodge an [string:uv.ptech.emp] by swerving out of the way or or using the [string:uv.ptech.jammer].
uv.tip.pt.esf1=Use the [string:uv.ptech.esf] to surround yourself with an offensive static field, delivering a damaging shock to anyone who touches it.
uv.tip.pt.esf2=Use the [string:uv.ptech.esf] to counter [string:uv.ptech.stunmine] or [string:uv.ptech.emp].
uv.tip.pt.repairkit1=Heavily damaged? Pop a [string:uv.ptech.repairkit] to get back up to full strength!
uv.tip.pt.spikes1=Use [string:uv.ptech.spikes] to pop the tires on the target vehicle, making it significantly more difficult to stay in control of their vehicle.
uv.tip.pt.spikes2=Use [string:uv.ptech.shockwave] or [string:uv.ptech.shockram] to push spike strips out of your way.
uv.tip.pt.jammer=You can tell who is currently using the [string:uv.ptech.jammer] if they can use other Pursuit Techs.

uv.tip.drafting=Be careful when drafting behind other Racers or Units, they can drop a [string:uv.ptech.spikes] or a [string:uv.ptech.stunmine] directly in your path.

# Racer
uv.tip.racer.pt.jammer1=The [string:uv.ptech.jammer] not only interferes with the HUD of other drivers, it also instantly disables any active Pursuit Tech.
uv.tip.racer.pt.jammer2=Use the [string:uv.ptech.jammer] to disable AI Units from spawning, giving you a chance to escape.
uv.tip.racer.pt.shockwave1=Use [string:uv.ptech.shockwave] to push vehicles around you away.
uv.tip.racer.pt.stunmine1=[string:uv.ptech.stunmine] are deployed behind your vehicle and cause damage to any vehicle that drives near it.
uv.tip.racer.pt.powerplay1=Use [string:uv.ptech.powerplay] to remotely trigger the closest Pursuit Breaker.
uv.tip.racer.pt.juggernaut1=Trouble with roadblocks? Try using [string:uv.ptech.juggernaut] to increase the ramming power of your vehicle.
uv.tip.racer.pt.ghost1=Use [string:uv.ptech.ghost] to temporarily make you non-collidable with props and other drivers.

uv.tip.racer.pt.killswitch1=Dodge a [string:uv.ptech.killswitch] by driving away from the attacker or using the [string:uv.ptech.jammer]
uv.tip.racer.pt.shockram1=Units may be armed with the [string:uv.ptech.shockram] which both damages vehicles, and pushes vehicles in front of them around.
uv.tip.racer.pt.gpsdart1=Got hit with [string:uv.ptech.gpsdart]? Get rid of it by smashing it against a wall or object or using the [string:uv.ptech.jammer].
uv.tip.racer.pt.grappler1=Caught by the [string:uv.ptech.grappler]? Use momentum to throw the unit around, or even break the rope, or disable it outright with the [string:uv.ptech.jammer].

uv.tip.racer.cooldown=While in cooldown, find a quiet spot and turn off your engine to lose them faster.
uv.tip.racer.aitactics1=AI Units struggle with world geometry and rought terrain, so heading into dirt, forests, or construction sites can trap or confuse them.
uv.tip.racer.aitactics2=AI Units will utilize rolling roadblocks to stop you. Hit the brakes or look for a way to dodge them.
uv.tip.racer.pb=Drive through <color=255,255,0>Pursuit Breakers</color> (marked with red triangles) to take out structures and immobilize any Units unfortunate enough to be following you.
uv.tip.racer.comunits1=<color=255,255,0>Commander Units</color> do not spawn with repair kits, and cannot repair themselves at the Repair Shop.
uv.tip.racer.comunits2=<color=255,255,0>Commander Units</color> cannot be taken down by flipping them over. Push them into a <color=255,255,0>Pursuit Breaker</color> or <color=255,255,0>water</color> to instantly neutralize them.
uv.tip.racer.comunits3=You can't evade if there's a <color=255,255,0>Commander Unit</color> around - take them out first!
uv.tip.racer.airunits1=Lose Air Units by hiding under cover, or use the [string:uv.ptech.jammer] to make them lose control temporarily.
uv.tip.racer.leastagro=Patrol and Support Units are the least aggressive units. They will mostly follow you around, and do not spawn with Pursuit Tech.
uv.tip.racer.roadblocks1=If you have to ram through a roadblock, try to hit lighter props or vehicles if possible.
uv.tip.racer.roadblocks2=Watch out for gaps in roadblocks - [string:uv.ptech.spikes] may be hiding there.
uv.tip.racer.boxedin=Boxed in? Use [string:uv.ptech.ghost] or [string:uv.ptech.shockwave] for an easy chance to escape!
uv.tip.racer.upgradedunits=Special and Commander Units come equipped with upgraded Pursuit Tech.
uv.tip.racer.stuck=If you're ever stuck, press [key:unitvehicle_keybind_resetposition] to reset back to the road.
uv.tip.racer.disorient=Take sharp, sudden turns, or jump over the water to disorient Units.
uv.tip.racer.rhinounits=Avoid head-on collisions with <color=255,255,0>Rhino Units</color>.

# Unit
uv.tip.unit.pt.killswitch1=Try to use [string:uv.ptech.killswitch] on targets that can't easily evade it, such as in a straight line, or with the target already in the process of getting pinned.
uv.tip.unit.pt.killswitch2=Once locked on, the [string:uv.ptech.killswitch] will disable the target vehicle's engine for a short duration, making it easier to arrest them.
uv.tip.unit.pt.shockram1=Use the [string:uv.ptech.shockram] to damage any vehicle ahead of you.
uv.tip.unit.pt.gpsdart1=Suspects hit with the [string:uv.ptech.gpsdart] are unable to evade.
uv.tip.unit.pt.grappler1=When using the [string:uv.ptech.grappler], ensure you slow down gradually to avoid getting thrown around, or end up getting the rope cut.

uv.tip.unit.pt.shockwave1=Suspects who are trapped may use [string:uv.ptech.shockwave] to push Units out of their way.
uv.tip.unit.pt.juggernaut1=Suspects using [string:uv.ptech.juggernaut] are NOT invincible and can still take damage from collisions.
uv.tip.unit.pt.ghost1=Suspects using [string:uv.ptech.ghost] can still get hit with the [string:uv.ptech.emp], [string:uv.ptech.killswitch] and the [string:uv.ptech.shockram].

uv.tip.unit.pit=Perform a PIT maneuver by ramming a target's rear end, causing them to spin out and lose control.
uv.tip.unit.teamwork=Work together as a team to apprehend suspects. Close the gap and try to avoid ramming each other, which could give the suspect space to escape.
uv.tip.unit.roadblocks=You can place your own [string:uv.ptech.spikes] to fill any gaps in roadblocks.
uv.tip.unit.loneunit=As a lone unit, try to avoid getting ahead of the suspect, as they can make a quick turn, take an early exit, or use Pursuit Tech to neutralize you.
uv.tip.unit.comunit=As the <color=255,255,0>Commander Unit</color>, you should always remain near the target vehicle, but not engage them unless you have to.
uv.tip.unit.nocooldown=As a Unit, you are unable to see not only the cooldown meter, but also the hiding notification.
uv.tip.unit.respawn=You can press [key:unitvehicle_keybind_resetposition] at any point to respawn as a new Unit.
uv.tip.unit.pbnote=<color=255,255,0>Pursuit Breakers</color> can take out your vehicle if you hit any props from the structure.
