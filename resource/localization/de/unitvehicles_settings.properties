uv.ui.racertags=Namensschilder
uv.ui.racertags.desc=Rennen: Zeigt Namensschilder über Mitteilnehmern mit deren Namen und aktuellen Platzierung.\n\nVerfolgung: Zeigt Namensschilder über Verdächtigen an. Zeigt außerdem ein Namensschild über dem Einsatzleiter.

