uv.ptech.juggernaut.desc=El Juggernaut incrementa masivamente la fuerza de impacto de tu vehiculo, haciendo mas facil despejar bloqueos u objetos por la carretera.

uv.ptech.juggernaut.activated=JUGGERNAUT ACTIVADO

uv.ptech.ghost.title=——— Fantasma ———
uv.ptech.ghost=Fantasma
uv.ptech.ghost.short=FTSM
uv.ptech.ghost.desc=Al activar el fantasma, el vehículo del conductor no colisionará con objetos y otros vehículos.

uv.ptech.ghost.activated=FANTASMA ACTIVADO

# Units Only
# uv.ptech.killswitch.title=——— Killswitch ———
# uv.ptech.killswitch=Killswitch
# uv.ptech.killswitch.short=KILLSW
uv.ptech.killswitch.desc=El killswitch es un sistema que lanza ondas electromagneticas las cuales permiten apagar el motor del vehiculo sospechoso.

uv.ptech.killswitch.activated=KILLSWITCH ACTIVADO
uv.ptech.killswitch.lockingon=FIJANDO KILLSWITCH
uv.ptech.killswitch.dodged=KILLSWITCH EVITADO
uv.ptech.killswitch.hit=Has asestado un impacto a %s con un Killswitch
uv.ptech.killswitch.hit.you=Impacto de %s con un Killswitch

uv.ptech.killswitch.engine.on=MOTOR ENCENDIDO
uv.ptech.killswitch.getclose=ACERCATE PARA USAR UN KILLSWITCH
uv.ptech.killswitch.novalid=OBJETIVO NO VALIDO PARA UN KILLSWITCH

uv.ptech.spikes.title=——— Banda de clavos ———
uv.ptech.spikes=Banda de clavos
uv.ptech.spikes.short=CLAVOS
uv.ptech.spikes.desc=Desplegada desde la parte de atrás del vehiculo, la banda de clavos se expande rapidamente para pincharle las ruedas a los demas vehiculos. Si no se esquiva puede llegar a impactar en varios vehiculos.

uv.ptech.spikes.activated=BANDA DE CLAVOS DESPLEGADA

uv.ptech.spikes.tiresreinflate=REINFLANDO RUEDAS

uv.ptech.shockram.title=——— Shock Ram ———
uv.ptech.shockram=Ariete
uv.ptech.shockram.short=ARIETE
uv.ptech.shockram.desc=El ariete crea una onda sónica que se dispersa desde el frontal del vehiculo. Los coches atrapados en el estallido resultan repelidos y dañados.

uv.ptech.shockram.activated=ARIETE DESPLEGADO
uv.ptech.shockram.hit=Has asestado un impacto a %s con un ariete
uv.ptech.shockram.hit.you=Impacto de %s con un ariete

uv.ptech.gpsdart.title=——— Dardo GPS ———
uv.ptech.gpsdart=Dardo GPS
uv.ptech.gpsdart.short=GPS
uv.ptech.gpsdart.desc=El dardo GPS es un sistema de marcamiento de vehiculos lanzado desde la parte posterior del vehiculo que muestra, rastrea y localiza vehiculos en fuga.

uv.ptech.gpsdart.activated=DARDO GPS DESPLEGADO
uv.ptech.gpsdart.missed=DARDO GPS FALLADO

uv.ptech.gpsdart.hit=Le has dado a %s con un Dardo GPS
uv.ptech.gpsdart.hit.you=%s te ha dado con un Dardo GPS

uv.ptech.expbarrel.title=——— Barril explosivo ———
uv.ptech.expbarrel=Barril explosivo

uv.ptech.grappler.title=——— Gancho ———
uv.ptech.grappler=Gancho
uv.ptech.grappler.short=GNCH
uv.ptech.grappler.desc=El gancho es un dispositivo que usa una red de nailon de alta fuerza para enganchar la rueda trasera de un vehículo que huye, consiguiendo así, detenerlo de forma controlada.

uv.ptech.grappler.activated=GANCHO DESPLEGADO
uv.ptech.grappler.missed=GANCHO FALLADO

uv.ptech.grappler.hit=Le has dado a %s con el Gancho
uv.ptech.grappler.hit.you=%s te ha impactado con el Gancho

#---------- [ Tips Strings ]
# uv.tip=TIP: %s

# Shared
uv.tip.repairshop=Usa la [string:uv.repairshop] para reparar tu vehículo y recargar tu tecnologia de persecución. Si usas <color=255,255,0>Glide // Circular Functions</color>, esto también recargará tu nitro.

uv.tip.pt.emp1=Usa el [string:uv.ptech.emp] para lanzar un shock electrico al vehículo de en frente.
uv.tip.pt.emp2=Esquiva un [string:uv.ptech.emp] desviandote del camino o usando el [string:uv.ptech.jammer].
uv.tip.pt.esf1=Utiliza el [string:uv.ptech.esf] para cubrirte con un campo estático ofensivo, otorgandole un shock el eletrico a cualquiera que haga contacto con el.
uv.tip.pt.esf2=Usa el [string:uv.ptech.esf] para contrarrestar la [string:uv.ptech.stunmine] o el [string:uv.ptech.emp].
uv.tip.pt.repairkit1=¿Gravemente dañado? ¡Usa un [string:uv.ptech.repairkit] para recuperarte!
uv.tip.pt.spikes1=Utiliza la [string:uv.ptech.spikes] para pinchar las ruedas del vehículo objetivo, haciendo que el control del vehículo sea más dificil.
uv.tip.pt.spikes2=Usa la [string:uv.ptech.shockwave] o el [string:uv.ptech.shockram] para empujar las bandas de clavos fura de tu camino.
uv.tip.pt.jammer=Puedes determinar quien está usando el [string:uv.ptech.jammer] si ves que está utilizando tecnologia de persecución.

uv.tip.drafting=Ten cuidado al interntar conseguir rebufo detrás de otros corredores o unidades, podrian lanzar una [string:uv.ptech.spikes] o una [string:uv.ptech.stunmine] directamente en tu camino.

# Racer
uv.tip.racer.pt.jammer1=El [string:uv.ptech.jammer] no solo interfiere con la interfaz de otros corredores, también desactiva tecnologias de persecución activas.
uv.tip.racer.pt.jammer2=Utiliza el [string:uv.ptech.jammer] para evitar que las unidades IA aparezcan, dandote asi una oportunidad para escapar.
uv.tip.racer.pt.shockwave1=Usa la [string:uv.ptech.shockwave] para empujar vehículos alrededor de tu camino.
uv.tip.racer.pt.stunmine1=La [string:uv.ptech.stunmine] se despliega detrás de tu vehículo y produce daño a cualquier vehículo que pase cerca de ella.
uv.tip.racer.pt.powerplay1=Usa el [string:uv.ptech.powerplay] para activar pausas de persecución remotamente.
uv.tip.racer.pt.juggernaut1=¿Te complicas con los bloqueos? Prueba usando el [string:uv.ptech.juggernaut] para incrementar el poder de impacto de tu vehículo.
uv.tip.racer.pt.ghost1=Utiliza el [string:uv.ptech.ghost] para poder traspsasar objetos y otros corredores temporalmente.

uv.tip.racer.pt.killswitch1=Esquiva un [string:uv.ptech.killswitch] al alejarte del atacante o usando el [string:uv.ptech.jammer]
uv.tip.racer.pt.shockram1=Las unidades pueden estar armadas con el [string:uv.ptech.shockram] el cual daña y empuja vehículos a la vez.
uv.tip.racer.pt.gpsdart1=¿Te han impactado con un [string:uv.ptech.gpsdart]? Deshazte de el chocandote cotra la pared u objetos o utilizando el [string:uv.ptech.jammer].
uv.tip.racer.pt.grappler1=¿Atrapado por el [string:uv.ptech.grappler]? utiliza la inercia para desengancharte de la unidad, o incluso puedes romper la cuerda, o inutilizalo con el [string:uv.ptech.jammer].

uv.tip.racer.cooldown=Mientras estes en zona segura, encuentra un lugar callado y apaga el motor para perderlos mas rápido.
uv.tip.racer.aitactics1=Las unidades IA se complican con la geometria del mundo y con el terreno duro, asi que al ir por tierra, bosques, o lugares en construcción puede atraparlas o confundirlas.
uv.tip.racer.aitactics2=Las unidades IA utilizarán bloqueos activos para intenatar detenerte. Pisa bien los frenos o busca alguna manera para esquivarlos.
uv.tip.racer.pb=Derriba las <color=255,255,0>Pausas de persecución</color> (marcadas con triangulos rojos) para derribar estructuras e inmobilizar cualquier unidad desafortunada que te esté persiguiendo.
uv.tip.racer.comunits1=Las <color=255,255,0>Unidades Comandante</color> no reaparecen con kits de reparación, y no pueden reparase en las estaciones de reparación.
uv.tip.racer.comunits2=Las <color=255,255,0>Unidades Comandante</color> no pueden ser derribadas al causar que se den vuelta. Empujalas hacia una <color=255,255,0>Pausa de persecución</color> o hacia el <color=255,255,0>aguar</color> para neutralizarlas inmediatamente.
uv.tip.racer.comunits3=No puedes evadir si hay una <color=255,255,0>Unidad Comandante</color> circulando - ¡Primero derribala!
uv.tip.racer.airunits1=Pierde a las unidades aereas al esconderte bajo cobertura, o usa el [string:uv.ptech.jammer] para hacer que pierdan el control temporalmente.
uv.tip.racer.leastagro=Las unidades patrulla y de apoyo son las unidades menos agresivas. La mayoria del tiempo te seguirán, y no aparecen con tecnologias de persecución.
uv.tip.racer.roadblocks1=Si tienes que atravesar un bloqueo, intenta pasar por donde hayan objetos o vehículos ligeros si es posible.
uv.tip.racer.roadblocks2=Cuidado con los espacios entre los bloqueos - Las [string:uv.ptech.spikes] pueden estar escondiendose allí.
uv.tip.racer.boxedin=¿Acorralado? Utiliza el [string:uv.ptech.ghost] o la [string:uv.ptech.shockwave] ¡Para tener una mayor posibilidad de escapar!
uv.tip.racer.upgradedunits=Las unidades comandante y especial vienen equipdas con tecnologias de persecución mejoradas.
uv.tip.racer.stuck=Si te encuentas atascado, presiona [key:unitvehicle_keybind_resetposition] para recolocarte de vuelta en la carretera.
uv.tip.racer.disorient=Toma curvas verradas, finas, repentinas o salta sobre el agua para desorientar a las unidades.
uv.tip.racer.rhinounits=Evita colisiones de frente a frente con las <color=255,255,0>Unidades Rhino</color>.

# Unit
uv.tip.unit.pt.killswitch1=Intenta usar el [string:uv.ptech.killswitch] en objetivos que no pueden evadirlo con facilidad, ya sea en linea recta, o con un objetivo que ya esté en el proceso de ser acorralado.
uv.tip.unit.pt.killswitch2=Una vez fijado, el [string:uv.ptech.killswitch] apagará el motor del vehículo objetivo por un corto periodo de tiempo, haciendo que sea mas fácil el arresto.
uv.tip.unit.pt.shockram1=Utiliza el [string:uv.ptech.shockram] para dañar a culaquier vehículo en frente de tí.
uv.tip.unit.pt.gpsdart1=Los sospechosos que sean impactados por el [string:uv.ptech.gpsdart] serán incapaces de evadir.
uv.tip.unit.pt.grappler1=Al usar el [string:uv.ptech.grappler], asegurate de bajar tu velocidad gradualmente par evitar que tu vehículo no pierda el control, o que se la cuerda se corte.

uv.tip.unit.pt.shockwave1=Los sospechosos que estén atrapados pueden llegar a usar la [string:uv.ptech.shockwave] para empujar unidades fuera de su camino.
uv.tip.unit.pt.juggernaut1=Los sospechosos que hagan uso del [string:uv.ptech.juggernaut] NO son invencibles y pueden recibir daños por colisiones.
uv.tip.unit.pt.ghost1=Los sospechososque hagan uso del [string:uv.ptech.ghost] pueden seguir siendo impactados por el [string:uv.ptech.emp], [string:uv.ptech.killswitch] y el [string:uv.ptech.shockram].

uv.tip.unit.pit=Performa una maniobra PIT al colisionar con la parte trasera de un objetivo, provocando que pierda el control.
uv.tip.unit.teamwork=Trabajen juntos como equipo para detener sospechosos. Recorten distancia y intenten no colisionar entre ustedes, lo que podria causar que el sospechoso se escape.
uv.tip.unit.roadblocks=Puedes colocar tus propias [string:uv.ptech.spikes] para rellenar espacios vacios en los bloqueos.
uv.tip.unit.loneunit=Como unidad solitaria, intenta evitar adelantar al sospechoso, ya que pueden realizar giros inesperados, tomar una salida repentia, o usar tecnologias de persecución para neutralizarte.
uv.tip.unit.comunit=Como <color=255,255,0>Unidad Comandante</color>, siempre deberias mantenerte cerca del vehículo objetivo, pero no te lanzes a por el a no ser que tengas que hacerlo.
uv.tip.unit.nocooldown=Como unidad, eres incapaz de ver no solo el medidor de la zona segura, sino que también no podrás ver la notificación de que te estás escondiendo.
uv.tip.unit.respawn=Puedes presionar [key:unitvehicle_keybind_resetposition] en cualquier momento para reaparecer como una Unidad nueva.
uv.tip.unit.pbnote=Las <color=255,255,0>Pausas de persecución</color> pueden derribar tu vehículo si colisionas con cualquier objeto de las estructura.
