uv.audio.pursuittheme.random.type=Zufälliger Typ
uv.audio.pursuittheme.random.type.desc=Sequenziell: Zufällige Titel spielen nacheinander.\n\nAlle X Minuten: Alle X Minuten wird zu einem zufälligen Titel gewechselt.
uv.audio.pursuittheme.random.minutes=Alle X Minuten
uv.audio.pursuittheme.random.minutes.desc=Wie oft (in Minuten) soll die Titelmusik wechseln.\n\nErfordert, dass "Zufälliger Typ" auf "Alle X Minuten" gestellt ist.

