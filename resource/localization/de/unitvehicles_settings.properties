uv.ui.backup=Fall-Back
uv.ui.main.desc=Verändert Aussehen der Renn- und Verfolgungs-UIs, um der Benutzeroberfläche eines bestimmten Spiels zu ähneln.\n\nBeachte, dass das UI nicht 1:1 ist und es leichte Abweichungen haben kann.
uv.ui.backup.desc=Wenn das gewählte Haupt-UI kein Verfolgungs-UI hat, verwendet es das Verfolgungs-UI der Fall-Back-Option.\n\nBeachte, dass das UI nicht 1:1 ist und es leichte Abweichungen haben kann.

