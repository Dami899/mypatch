uv.ptech.killswitch.desc=Killswitch siktar sig in på bilar framför innan den levererar en massiv elektrostatisk puls som temporärligt stänger av deras elektriska system.

uv.ptech.killswitch.activated=KILLSWITCH AKTIVERAD
uv.ptech.killswitch.lockingon=KILLSWITCH LÅSER IN SIG
uv.ptech.killswitch.dodged=UNDVEK KILLSWITCH
uv.ptech.killswitch.hit=Du träffade %s med en Killswitch
uv.ptech.killswitch.hit.you=%s träffade dig med en Killswitch

uv.ptech.killswitch.engine.on=MOTOR OMSTARTAD
uv.ptech.killswitch.getclose=KÖR NÄRMRE FÖR ATT ANVÄNDA KILLSWITCH
uv.ptech.killswitch.novalid=INGET GILTIGT MÅL FÖR KILLSWITCH

uv.ptech.spikes.title=——— Spikmattor ———
uv.ptech.spikes=Spikmattor
uv.ptech.spikes.short=MATTA
uv.ptech.spikes.desc=Utplacerad från fordonets bak, Spikmattorna utökar sig snabbt för att skada däcken på dem fordonen som kör över dem, och kan träffa flertal fordon om den inte kan undvikas.

uv.ptech.spikes.activated=SPIKMATTA UTPLACERAD

uv.ptech.spikes.tiresreinflate=DÄCKEN FYLLS PÅ

# uv.ptech.shockram.title=——— Shock Ram ———
# uv.ptech.shockram=Shock Ram
# uv.ptech.shockram.short=SHRAM
uv.ptech.shockram.desc=Shock Ram skapar en sonisk chockvågsexplosion vid fordonets front som puttar undan och skadar fordon som fångas i den.

uv.ptech.shockram.activated=SHOCK RAM AKTIVERAD
uv.ptech.shockram.hit=Du träffade %s med en Shock Ram
uv.ptech.shockram.hit.you=%s träffade dig med en Shock Ram

uv.ptech.gpsdart.title=——— GPS-Pil ———
uv.ptech.gpsdart=GPS-Pil
# uv.ptech.gpsdart.short=GPS
uv.ptech.gpsdart.desc=GPS-Pilen är ett fordonsmärkningssystem skjutet från bilens front som träffar, spårar och lokaliserar flyende fordon.

uv.ptech.gpsdart.activated=GPS-PIL FRAMKALLAD
uv.ptech.gpsdart.missed=GPS-PILEN MISSADE

uv.ptech.gpsdart.hit=Du träffade %s med en GPS-Pil
uv.ptech.gpsdart.hit.you=%s träffade dig med en GPS-Pil

uv.ptech.expbarrel.title=——— Explosiv Tunna ———
uv.ptech.expbarrel=Explosiv Tunna

# uv.ptech.grappler.title=——— Grappler ———
# uv.ptech.grappler=Grappler
# uv.ptech.grappler.short=GRAP
uv.ptech.grappler.desc=Grapplern är en enhet som använder ett starkt nät av nylon för att fånga det flyende fordonets bakhjul som får in den till ett kontrollerbart stopp.

uv.ptech.grappler.activated=GRAPPLER FRAMKALLAD
uv.ptech.grappler.missed=GRAPPLERN MISSADE

uv.ptech.grappler.hit=Du träffade %s med en Grappler
uv.ptech.grappler.hit.you=%s träffade dig med en Grappler

#---------- [ Tips Strings ]
uv.tip=TIPS: %s

# Shared
uv.tip.repairshop=Använd [string:uv.repairshop] för att reparera ditt fordon och fylla på din jakt teknologi. Om du använder <color=255,255,0>Glide // Circular Functions</color> så fyller den också på din lustgas.

uv.tip.pt.emp1=Använd en [string:uv.ptech.emp] för att leverera en kraftig shock till fordonet framför.
uv.tip.pt.emp2=Undvik en [string:uv.ptech.emp] genom att köra ur vägen eller genom att använda en [string:uv.ptech.jammer].
uv.tip.pt.esf1=Använd en [string:uv.ptech.esf] för att täcka dig själv i ett offensivt statiskt fält som skickar en skadande shock till den som rör den.
uv.tip.pt.esf2=Använd [string:uv.ptech.esf] för att motverka [string:uv.ptech.stunmine] eller [string:uv.ptech.emp].
uv.tip.pt.repairkit1=Kraftigt skadad? Använd ett [string:uv.ptech.repairkit] för att komma tillbaks i toppform!
uv.tip.pt.spikes1=Använd [string:uv.ptech.spikes] för att spränga däcken på måltavlans fordon vilket gör det definitivt svårare att hålla kontrollen i fordonet.
uv.tip.pt.spikes2=Använd en [string:uv.ptech.shockwave] eller en [string:uv.ptech.shockram] för att trycka undan spikmattor.
uv.tip.pt.jammer=Du kan lista ut vem som använder en [string:uv.ptech.jammer] eftersom de kan fortsätta använda jakt teknologi.

uv.tip.drafting=Var försiktig när du kör bakom andra racers eller enheter då de kan släppa [string:uv.ptech.spikes] eller en [string:uv.ptech.stunmine] direkt framför dig.

# Racer
uv.tip.racer.pt.jammer1=[string:uv.ptech.jammer] stör inte endast andra spelares gränssnitt, men avaktiverar också all aktiv jakt teknologi.
uv.tip.racer.pt.jammer2=Använd [string:uv.ptech.jammer] för att hindra att AI-enheter uppstår, vilket ger dig en chans att fly.
uv.tip.racer.pt.shockwave1=Använd [string:uv.ptech.shockwave] för att trycka bort fordon runt dig.
uv.tip.racer.pt.stunmine1=[string:uv.ptech.stunmine] placeras ut bakom ditt fordon och delar ut skada till fordon som kör nära den.
uv.tip.racer.pt.powerplay1=Använd [string:uv.ptech.powerplay] för att fjärrkollapsa den närmsta Pursuit Breakern.
uv.tip.racer.pt.juggernaut1=Problem med vägspärrarna? Pröva att använda [string:uv.ptech.juggernaut] för att öka ditt fordons krockstyrka.
uv.tip.racer.pt.ghost1=Använd [string:uv.ptech.ghost] för att temporärligt göra ditt fordon icke-kolliderbart med föremål och andra förare.

uv.tip.racer.pt.killswitch1=Undvik [string:uv.ptech.killswitch] genom att köra bort från angriparen eller genom att använda en [string.uv.ptech.jammer].
uv.tip.racer.pt.shockram1=Enheter kan vara beväpnade med [string:uv.ptech.shockram] som både skadar och trycker undan fordon framför dem.
uv.tip.racer.pt.gpsdart1=Träffad med en [string:uv.ptech.gpsdart]? Få bort den genom att köra in i en vägg eller genom att använda en [string:uv.ptech.jammer].
uv.tip.racer.pt.grappler1=Fånged med en [string:uv.ptech.grappler]? Använd momentum för att kasta runt enheten, eller ta isär repet, eller avaktivera den direkt med en [string:uv.ptech.jammer].

uv.tip.racer.cooldown=Under nedkylningsfasen så kan du hitta en tyst plats och stänga av motorn för att tappa snuten snabbare.
uv.tip.racer.aitactics1=AI-enheter strular med världgeometri och tuff terräng, så kör mot grus, skogar eller byggarbetsplatser för att förvirra dem.
uv.tip.racer.aitactics2=AI-enheter använder rullande vägspärrar för att stoppa dig. Tryck på bromsen eller hitta ett sätt att undvika dem.
uv.tip.racer.pb=Kör genom <color=255,255,0>Pursuit Breakers</color> (märkta med röda trianglar) för att knocka ned strukturer och förstöra alla enheter som är olyckliga nog att följa efter dig.
uv.tip.racer.comunits1=<color=255,255,0>Ledningsenheter</color> uppstår inte med reperationskit och kan inte reparera sig själva vid en reperationsverkstad.
uv.tip.racer.comunits2=<color=255,255,0>Ledningsenheter</color> kan inte knockas genom att vända på dem. Tryck in dem i en <color=255,255,0>Pursuit Breaker</color> eller in i <color=255,255,0>vattnet</color> för att omedelbart neutralisera dem.
uv.tip.racer.comunits3=Du kan inte undvika om det finns en <color=255,255,0>Ledningsenhet</color> krav - knocka dem först!
uv.tip.racer.airunits1=Tappa bort Luftenheten genom att gömma dig under tak, eller använd en [string:uv.ptech.jammer] för att få dem att temporärligt tappa kontrollen.
uv.tip.racer.leastagro=Patrull- och Understödsenheter är dem minst aggressiva enheterna. De följer oftast efter dig, och uppstår inte med jakt teknologi.
uv.tip.racer.roadblocks1=Om du måste köra in i en vägspärr, försök träffa lättare föremål eller fordon om det är möjligt.
uv.tip.racer.roadblocks2=Se upp i gap i vägspärrar - [string:uv.ptech.spikes] kanske gömmer sig där.
uv.tip.racer.boxedin=Intryckt? Använd [string:uv.ptech.ghost] eller [string:uv.ptech.shockwave] för en lätt möjlighet att fly!
uv.tip.racer.upgradedunits=Special- och Ledningsenheter kommer utrustade med uppgraderad jakt teknologi.
uv.tip.racer.stuck=Om du någonsin fastnar så kan du trycka på [key:unitvehicle_keybind_resetposition] för att återställa tillbaka till vägen.
uv.tip.racer.disorient=Ta skarpa, plötsliga svängar, eller hoppa över vatten för att förvirra enheter.
uv.tip.racer.rhinounits=Undvik frontalkrockar med <color=255,255,0>Noshörningsenheter</color>.

# Unit
uv.tip.unit.pt.killswitch1=Försök använda [string:uv.ptech.killswitch] på måltavlor som inte lätt kan undvika den, exempelvis i en rak linje, eller dem som redan håller på att bli intryckta.
uv.tip.unit.pt.killswitch2=När du låst in dig så kommer [string:uv.ptech.killswitch] avaktivera måltavlans motor en kort stund vilket gör det lättare att arrestera dem.
uv.tip.unit.pt.shockram1=Använd [string:uv.ptech.shockram] för att skada fordon framför dig.
uv.tip.unit.pt.gpsdart1=Misstänkta som träffas med en [string:uv.ptech.gpsdart] kan inte komma undan.
uv.tip.unit.pt.grappler1=När du använder [string:uv.ptech.grappler], försök gradvist sakta ner för att undvika att du slängs runt, eller lyckas ta isär repet.

uv.tip.unit.pt.shockwave1=Misstänkta som är fast kan använda en [string:uv.ptech.shockwave] för att knuffa undan enheter ur vägen.
uv.tip.unit.pt.juggernaut1=Misstänkta som använder [string:uv.ptech.juggernaut] är INTE odödliga och tar fortfarande skada från kollisioner.
uv.tip.unit.pt.ghost1=Misstänkta som använder [string:uv.ptech.ghost] kan fortfarande träffas av [string:uv.ptech.emp], [string:uv.ptech.killswitch] och [string:uv.ptech.shockram].

uv.tip.unit.pit=Utför en PIT-manöver genom att köra in i måltavlans bakre del vilket gör att de snurrar runt och tappar kontrollen.
uv.tip.unit.teamwork=Jobba som ett team för att arrestera misstänkta. Stäng gapet och försök att inte krocka in i varandra, vilket kan ge den misstänkte utrymme att fly.
uv.tip.unit.roadblocks=Du kan placera dina egna [string:uv.ptech.spikes] för att fylla gap i vägspärrar.
uv.tip.unit.loneunit=Som en ensam enhet så ska du försöka undvika att vara framför den misstänkte, då de kan ta en snabb sväng eller tidig avfart, eller använda jakt teknologi för att neutralisera dig.
uv.tip.unit.comunit=Som <color=255,255,0>Ledningsenheten</color> så borde du hålla dig nära det misstänkta fordonet, men inte gå på anfall om du kan undvika det.
uv.tip.unit.nocooldown=Som en Enhet så kan du inte bara inte se nedkylningsmätaren, men inte heller gömställe notifikationen.
uv.tip.unit.respawn=Du kan trycka på [key:unitvehicle_keybind_resetposition] när som helst för att återuppstå som en ny enhet.
uv.tip.unit.pbnote=<color=255,255,0>Pursuit Breakers</color> kan knocka ditt fordon om du träffas av några föremål från strukturen.
