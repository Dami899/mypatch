uv.ptech.gpsdart.activated=GPS DART ABGEWORFEN
uv.ptech.gpsdart.missed=GPS DART VERFEHLT

uv.ptech.gpsdart.hit=Du hast %s mit einem GPS Dart getroffen
uv.ptech.gpsdart.hit.you=%s hat dich mit einem GPS Dart getroffen

